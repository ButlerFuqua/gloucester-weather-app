workflows:
  android-release:
    name: Android Release
    max_build_duration: 30
    environment:
      flutter: stable
      groups:
        - gloucerster_weather_app
    scripts:
      - name: Write .env from environment variables
        script: |
          echo "OWM_API_KEY=$OWM_API_KEY" > "$CM_BUILD_DIR/.env"
      - name: Set up Android signing
        script: |
          echo "$CM_KEYSTORE" | base64 --decode > "$CM_BUILD_DIR/android/upload-keystore.jks"
          {
            echo "storePassword=$CM_KEYSTORE_PASSWORD"
            echo "keyPassword=$CM_KEY_PASSWORD"
            echo "keyAlias=$CM_KEY_ALIAS"
            echo "storeFile=$CM_BUILD_DIR/android/upload-keystore.jks"
          } > "$CM_BUILD_DIR/android/key.properties"
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build release AAB
        script: flutter build appbundle --release
    artifacts:
      - build/**/outputs/**/*.aab
